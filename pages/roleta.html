<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roleta</title>
  <link rel="stylesheet" href="../css/roleta.css">
</head>
<body>
  <div class="container">
    <h1>Roleta</h1>

    <div class="roulette">
      <div class="pointer"></div>

      <div class="wheel">
        <div class="label l1">GANHOU</div>
        <div class="label l2">PERDEU</div>
        <div class="label l3">PERDEU</div>
        <div class="label l4">PERDEU</div>
        <div class="label l5">PERDEU</div>
        <div class="label l6">PERDEU</div>
        <div class="label l7">PERDEU</div>
        <div class="label l8">PERDEU</div>
        <div class="label l9">PERDEU</div>
        <div class="label l10">PERDEU</div>
      </div>
    </div>

    <div id="spin-area">
      <button id="spin-button">Girar</button>

      <div id="snoopy-helper" class="hidden">
        <img src="../img/snoopy-help.png" alt="Snoopy" id="snoopy-img">
        <div id="speech-bubble">eu vou ajudar você</div>
      </div>
    </div>

    <p id="resultado"></p>
    <div id="ticket-container"></div>
  </div>

  <script src="../js/roleta.js"></script>
</body>
</html>
