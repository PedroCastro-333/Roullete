<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket</title>
    <link rel="stylesheet" href="../css/ticket.css">
</head>

<body>
    <main class="ticket-page">
        <section class="ticket-card">
            <div class="ticket-top">
                <span class="ticket-badge">🎟️ Ticket Premiado</span>
                <h1>Parabéns!</h1>
                <p class="subtitle">Seu ticket foi gerado com sucesso.</p>
            </div>

            <div class="ticket-body">
                <div class="ticket-line">
                    <span>Ganhador</span>
                    <strong id="winner-name">---</strong>
                </div>

                <div class="ticket-line">
                    <span>Prêmio</span>
                    <strong id="ticket-prize">---</strong>
                </div>

                <div class="ticket-line">
                    <span>Status</span>
                    <strong class="success">Confirmado</strong>
                </div>

                <div class="ticket-line">
                    <span>Código</span>
                    <strong id="ticket-code">---</strong>
                </div>
            </div>

            <Procure class="brinde">
                <p>Brinde: Um beijo.</p>
                <span>Procure <strong>imediatamente</strong> o Pedrin mais próximo para a retirada dos prêmios.</span>
            </div>

            <div class="ticket-footer">
                <button id="back-button">Voltar ao início</button>
            </div>
        </section>
    </main>

    <script src="../js/ticket.js"></script>
</body>

</html>
